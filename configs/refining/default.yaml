meta:
  id: data/refining/default
  description: Corpus refinement for foundation pretraining — truncation, knowledge density, code dumps

enabled: true

# Legacy static floor — ignored when adaptive_density_only is true.
min_knowledge_density: 38.0
adaptive_density_only: true
# Protected domains (math, medicine, history) get this discount on the floor.
diversity_density_discount: 8.0

remove_heavy_truncation: true
repair_slight_truncation: true
remove_raw_code_dumps: true
strip_dominant_code_blocks: true
document_curation: true

min_chars_after_refine: 60
metadata_cleaning: true
strip_code_license_headers: true
corpus_dedup: true
chars_per_token: 3.8

artifact_discovery: true
artifact_discovery_shadow: false
artifact_discovery_trim: true
artifact_discovery_primary: false
artifact_discovery_legacy_fallback: true
artifact_discovery_corpus_dir: ''

semantic_cleaning: true
legacy_regex_cleaning: false

semantic_embedded:
  url_line_ratio: 0.35
  contact_token_ratio: 0.12
  anchor_density: 0.06
  lead_noise_remove: 0.48
  lead_noise_rest_better: 0.38
  lead_utility_floor: 0.22
  lead_utility_short: 0.20
  lead_utility_keep: 0.16
  rest_utility_delta: 0.12
  prefix_noise_min: 0.38
  edge_line_remove: 0.55
  edge_line_early: 0.38
  suffix_threshold_fence: 0.72
  suffix_threshold_plain: 0.58
  suffix_utility_preserve: 0.15
  knowledge_dampen: 0.35
  line_nav_weight: 0.30
  line_meta_weight: 0.20
  line_boilerplate_weight: 0.25
  line_promo_weight: 0.15
  line_noise_weight: 0.10
  pipe_nav_boost: 0.35
  url_line_boost: 0.25
  knowledge_dampen_line: 0.50
  url_noise_boost: 0.20
  promo_boost: 0.35
  transactional_boost: 0.25
  no_preserve_boost: 0.22
  utility_floor: 0.22
  metadata_noise_floor: 0.40
  lead_short_noise: 0.40
  position_lead: 0.02
  position_mid: 0.5
  position_footer: 0.85
  lead_short_chars: 700
  edge_early_scan: 4
  paragraph_signal_divisor: 5.0
  prefix_min_text: 200
  prefix_min_sent_len: 24
  prefix_max_sentences: 8
  strip_prefix_min_len: 300
  edu_marker_min: 1
  lead_word_min: 15
  lead_avg_line_min: 35
  lead_keep_word_min: 12
  pipe_nav_max_len: 220
  url_line_max_len: 180
  struct_prefix_max_chars: 80

meta:
  id: data/pipeline/default
  description: Canonical corpus curation pipeline policy

normalization:
  collapse_whitespace: true
  strip_control_chars: true

artifact_cleaning:
  strip_ui_noise: true
  strip_metadata_lines: true
  strip_boilerplate: true
  strip_social_promo: true
  foundation_metadata_clean: true

structural_repair:
  repair_truncation: true
  remove_heavy_truncation: true
  strip_dominant_code: true
  remove_code_dumps: true
  min_chars_after_repair: 60
  thresholds:
    trunc_repair_probability: 0.35
    trunc_remove_probability: 0.72
    code_dump_probability: 0.55
    educational_code_score: 0.25
    educational_syntax_balance: 0.85

decision:
  code_hits_for_code: 3
  prose_ratio_for_code: 0.55
  code_hits_for_mixed: 2
  educational_score_mixed: 0.1
  prose_ratio_mixed: 0.35
  ocr_min_text_chars: 80
  ocr_single_char_ratio: 0.12
  ocr_single_char_mult: 4.0
  ocr_broken_min: 2
  ocr_broken_char_div: 300
  ocr_pipe_noise_ratio: 0.04
  ocr_pipe_noise_mult: 12.0
  invalid_syntax_balance: 0.6
  generated_score_max: 0.5
  secret_pii_score: 0.45
  truncation_wiki_exempt: 0.88
  truncation_exempt_domains: [wiki, code, docs, reasoning]
  technical_domains: [code, reasoning, docs, wiki, qa]
  code_syntax_floor: 0.68
  alpha_syntax_floor: 0.5
  chars_per_token_floor: 2.5
  confidence_base: 0.5
  signal_penalty_floor: 0.3
  signal_penalty_weight: 0.5
  soft_signal_penalty: 0.15
  issue_count_penalty: 3
  issue_confidence_mult: 0.85
  synthetic_edu_threshold: 0.5
  synthetic_penalty_threshold: 0.4
  synthetic_confidence_mult: 0.75
  language_blend_base: 0.85
  language_blend_weight: 0.15
  confidence_min: 0.1
  confidence_max: 1.0

classification:
  enabled: true
  thresholds:
    commercial_dominant:
      content_commercial: 0.55
      signals_commercial: 0.45
      max_overall_value: 0.22
      max_educational: 0.20
      max_technical: 0.25
    low_value_overall: 0.22
    government_low_value: 0.15
    license_min_hits: 2
    license_max_overall: 0.22
    scaffold_max_words: 35
    metadata_only_max_words: 40
    metadata_only_max_facts: 2
    metadata_only_max_educational: 0.15
    commercial_edu_floor: 0.25
    structured_code_syntax: 0.85
    structured_code_educational: 0.15
    code_density_text: 0.18
    code_density_mixed: 0.06

scoring:
  chars_per_token: 3.8
  composite_weights:
    knowledge: 0.22
    educational: 0.17
    technical: 0.14
    coherence: 0.14
    information_density: 0.07
    novelty: 0.05
  context_blend:
    coherence: 0.5
    structural: 0.3
    artifact_inverse: 0.2
    truncation_penalty: 20.0
  artifact_penalty: 0.30
  noise_penalty: 0.10
  duplication_penalty: 0.08
  continuous_weight: 0.70
  utility_weight: 0.30

curator:
  keep:
    min_composite: 48.0
    min_knowledge: 40.0
    max_artifact_contamination: 42.0
    min_words: 12
  rewrite:
    min_composite: 25.0
    min_knowledge: 25.0
    max_artifact_contamination: 68.0
    min_words: 12
  salvage:
    technical_value_floor: 45.0
    educational_value_floor: 42.0
    salvage_flags: [synthetic_spam, low_value_news]
  code_rewrite:
    min_structural_integrity: 85.0
    min_technical_value: 45.0
  rewrite_sample_weight: 0.85
  drop:
    hard_reject_flags:
      - toxicity
      - pii
      - injection
      - software_piracy
      - proprietary_license
      - credential_leak
      - synthetic_spam
      - commercial_content
      - code_dump
      - truncated
      - context_mismatch
      - low_value_news
      - license_or_metadata_only
      - entertainment_clickbait
      - instruction_scaffold_only
      - vendor_sdk_dump

rewrite:
  normalize_qa: true
  strip_qa_tail: true
  strip_artifact_lines: true
  max_padding_ratio: 0.20
  max_synthetic_score: 0.18
  max_seo_score: 0.10
  prefer_compression: true

validation:
  score_bounds: [0.0, 100.0]
  require_doc_id: false
  reject_conflicting_action: true

export:
  text_keys: [text, content, body, markdown]
  attach_scores: true
  attach_decision: true

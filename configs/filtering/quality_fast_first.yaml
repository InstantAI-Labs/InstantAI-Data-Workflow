meta:
  id: data/filtering/quality_fast_first
  purpose: mix_10gb first model — adaptive quality, signal-based rejection, high throughput
  target_bytes: 12000000000

deduplication: true
language_detection: true
quality_scoring: true
tokenizer_validation: false
observability: false

sample_scores: 2000

adaptive_calibration:
  enabled: true
  warmup_samples: 200
  reservoir_size: 10000
  downrank_anchor_percentile: 30.0

cleaning:
  enabled: true
  minimal: false
  knowledge_extraction: true
  semantic_cleaning: true
  legacy_regex_cleaning: true
  inline_artifact_removal: true
  document_understanding: true
  semantic_embedded:
    url_line_ratio: 0.35
    lead_noise_remove: 0.48
    edge_line_remove: 0.55
    suffix_threshold_fence: 0.72
    suffix_threshold_plain: 0.58
  chars_per_token_estimate: 4.0
  stages:
    html_cleaning: true
    ui_noise_removal: true
    metadata_removal: true
    pretraining_metadata_cleaning: true
    content_compression: true
  qa_extraction:
    enabled: true
  segmentation:
    enabled: false
  thresholds:
    min_chars_after_clean: 200
    max_ui_noise_ratio: 0.40
    max_boilerplate_ratio: 0.50
    max_duplicate_ratio: 0.32
  dedupe_paragraphs: true
  drop_acknowledgements: true
  drop_moderator_notices: true
  drop_quoted_replies: true
  preserve_code_fences: true
  truncation_repair: true
  code_preservation: true
  strip_license_blocks: true
  strip_copyright_lines: true
  document_gate: true
  artifact_cleaning: true
  artifact_discovery: true
  artifact_discovery_shadow: false
  artifact_discovery_trim: true

thresholds:
  # No hard score floors — rejection is signal-based only.
  min_score: 0.0
  high_quality_only: false
  min_alpha_ratio: 0.30
  min_chars: 80
  max_chars: 120000
  max_toxicity: 0.45
  max_pii_score: 0.45
  max_truncation_score: 0.55
  max_boilerplate_score: 0.45
  max_commercial_score: 0.42
  max_seo_spam_score: 0.40
  max_low_information_score: 0.55
  max_software_piracy_score: 0.18
  min_informative_density: 0.012
  max_repetition: 0.70
  max_token_spam_score: 0.50
  min_structural_quality: 0.20
  min_coherence_score: 0.15
  warn_truncation_score: 0.30
  warn_boilerplate_score: 0.22
  warn_commercial_score: 0.18
  warn_seo_spam_score: 0.15
  warn_low_information_score: 0.25
  warn_discovery_artifact_score: 0.28
  max_discovery_artifact_score: 0.55
  score_sample_chars: 8192

synthetic_defense:
  enabled: true
  max_synthetic_score: 0.42
  min_semantic_diversity: 0.22
  max_repeated_span_score: 0.70

multilingual:
  enabled: false

semantic_selection:
  enabled: true
  section_mode: true

dedup:
  exact: true
  fuzzy: true
  fuzzy_threshold: 0.90
  fuzzy_num_perm: 64
  fuzzy_quality_margin: 0.05
  semantic: false
  semantic_hamming_threshold: 4
  semantic_jaccard_threshold: 0.72
  skip_within_document_chunks: false

balance:
  enabled: true
  soft_cap_overflow: 0.15
  quality_cap_bypass_score: 0.75
  quality_high_value_domain_bypass_score: 0.58
  min_kept_before_cap: 200
  domain_caps:
    web: 0.55
    docs: 0.20
    wiki: 0.18
    code: 0.25
    reasoning: 0.18
    qa: 0.15
    conversation: 0.08
  language_caps:
    en: 0.75
    es: 0.10
    de: 0.08
    fr: 0.08
    hi: 0.12
    ar: 0.08
    other: 0.20

curriculum:
  enabled: false

language:
  enabled: true
  fast_detector_only: true

toxicity:
  enabled: true
  mode: rules_only
  classifier_enabled: false

pii:
  enabled: true
  mode: structural_only
  ner_enabled: false

orchestration:
  enabled: false

corpus_evaluation:
  enabled: false
  lightweight: true

observability:
  enabled: false

licensing:
  enabled: true
  include_provenance_in_jsonl: false
  reject_proprietary: true
  reject_paywalled: true
  flag_unknown: true

telemetry:
  enabled: false
  output_dir: artifacts/reports/data/quality

extends: data/filtering/quality_fast_first

meta:
  id: data/filtering/quality_english_150m
  purpose: >
    English-first 150M foundation model. Non-English documents are rejected
    during merge via balance language_caps — raw source configs are unchanged.

synthetic_defense:
  enabled: true
  max_synthetic_score: 0.42
  min_semantic_diversity: 0.22
  max_repeated_span_score: 0.70

dedup:
  exact: true
  fuzzy: true
  fuzzy_threshold: 0.90
  fuzzy_num_perm: 64
  fuzzy_quality_margin: 0.05
  semantic: false
  skip_within_document_chunks: false

observability:
  enabled: true

corpus_evaluation:
  enabled: true
  lightweight: true

licensing:
  include_provenance_in_jsonl: true

balance:
  language_caps:
    en: 1.0
    other: 0.0

language:
  enabled: true
  english_only: true
  skip_post_clean_detection: true
  fast_detector_only: true
  gate:
    reject_zero_cap_locales: true
    min_primary_probability: 0.75
    min_confidence: 0.50
    reject_unknown: false
    max_fragmentation: 0.65
  mixed:
    enabled: false
    dominance_threshold: 0.90
    mixed_threshold: 0.28

extends: data/filtering/quality_english_150m

meta:
  id: data/filtering/quality_foundation_en
  purpose: >
    English foundation pretraining — natural human knowledge, high information
    density, no instruction-tuning or synthetic QA corpora. Keeps natural FAQs
    embedded in web articles; rejects instruction wrappers and synthetic supervision.

synthetic_defense:
  enabled: true
  max_synthetic_score: 0.42
  min_semantic_diversity: 0.22
  max_repeated_span_score: 0.70

cleaning:
  pretraining_metadata_cleaning: true
  document_gate: true
  drop_quoted_replies: true
  drop_moderator_notices: true
  drop_acknowledgements: true
  preserve_code_fences: true
  code_preservation: true
  truncation_repair: true
  artifact_cleaning: true
  artifact_discovery: true
  artifact_discovery_trim: true
  thresholds:
    min_chars_after_clean: 200
    max_ui_noise_ratio: 0.38
    max_boilerplate_ratio: 0.45
    max_duplicate_ratio: 0.30

thresholds:
  min_score: 0.0
  min_informative_density: 0.015
  max_boilerplate_score: 0.40
  max_seo_spam_score: 0.38
  max_low_information_score: 0.50
  max_commercial_score: 0.40

balance:
  enabled: true
  domain_caps:
    web: 0.52
    docs: 0.22
    wiki: 0.20
    code: 0.22
    reasoning: 0.18
    qa: 0.0
    conversation: 0.0
  language_caps:
    en: 1.0
    other: 0.0

dedup:
  exact: true
  fuzzy: true
  fuzzy_threshold: 0.90
  fuzzy_num_perm: 64
  fuzzy_quality_margin: 0.05
  semantic: false
  skip_within_document_chunks: false

language:
  enabled: true
  english_only: true
  skip_post_clean_detection: true
  fast_detector_only: true
  gate:
    reject_zero_cap_locales: true
    min_primary_probability: 0.78
    min_confidence: 0.52
    reject_unknown: false
    max_fragmentation: 0.60
  mixed:
    enabled: false

curriculum:
  enabled: false

semantic_selection:
  enabled: true
  prefer_keep: true

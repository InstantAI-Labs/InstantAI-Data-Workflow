version: instant-toxicity-v2
enabled: true
mode: rules_only

thresholds:
  accept: 0.20
  review: 0.60
  reject: 0.80
  hard_reject: 0.95

categories:
  - hate
  - harassment
  - violence
  - extremism
  - self_harm
  - sexual_abuse

scoring_weights:
  classifier: 0.0
  rule: 0.45
  pattern: 0.45
  context: 0.10

classifier:
  enabled: false

context:
  enabled: true
  educational_dampening: 0.75
  min_confidence: 0.42

fast_rules:
  profanity_spam:
    min_repeats: 5
    min_token_len: 3
  repeated_phrase:
    min_repeats: 4
    window_tokens: 6
  rules:
    extremist_slogan:
      weight: 0.95
      patterns:
        - '(?i)\b(sieg heil|heil hitler|white power|day of the rope)\b'
    harassment_spam:
      weight: 0.85
      patterns:
        - '(?i)(\byou\b.{0,40}\b(die|suffer|worthless)\b.*){2,}'
    harassment_direct:
      weight: 0.92
      patterns:
        - '(?i)\b(you are|you''re)\s+(worthless|trash|garbage|pathetic)\b'
        - '(?i)\bhope you suffer\b'
        - '(?i)\bnobody wants you\b'
    hate_group:
      weight: 0.95
      patterns:
        - '(?i)\bkill all of them\b'
        - '(?i)\bexterminate the entire group\b'
        - '(?i)\b(exterminate|genocide)\b.{0,24}\b(group|them|people)\b'
  patterns:
    direct_threat:
      weight: 0.95
      patterns:
        - "(?i)\\b(i(?:'ll| will)).{0,40}\\b(kill|murder|hurt|shoot)\\b.{0,30}\\byou\\b"
    self_harm_directive:
      weight: 1.0
      patterns:
        - '(?i)\b(you should (?:hurt|kill) yourself|go kill yourself)\b'
    recruitment:
      weight: 0.92
      patterns:
        - '(?i)\b(martyr operation|fight for the (cause|movement)|join our cell)\b'
    harassment_insult:
      weight: 0.90
      patterns:
        - '(?i)\b(worthless trash|hope you suffer)\b'
    hate_extermination:
      weight: 0.96
      patterns:
        - '(?i)\bkill all of them\b'
        - '(?i)\bexterminate the entire group\b'

validation:
  min_detection_rate: 0.95
  max_false_positive_rate: 0.05
  max_false_negative_rate: 0.05

reporting:
  output_dir: artifacts/data/toxicity

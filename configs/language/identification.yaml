version: instant-language-v2
enabled: true

detector:
  backend: langid
  min_text_chars: 4
  max_chars: 12000

mixed:
  enabled: true
  min_segment_chars: 2
  mixed_threshold: 0.28
  dominance_threshold: 0.85

hints:
  und_primary_probability: 0.25
  und_confidence: 0.20
  und_fragmentation: 0.85
  technical_domains: [code, docs, reasoning, qa, wiki]

gate:
  min_confidence: 0.55
  min_primary_probability: 0.35
  max_fragmentation: 0.72
  reject_unknown: false
  reject_zero_cap_locales: false

validation:
  min_accuracy: 0.95
  min_mixed_accuracy: 0.90
  min_unknown_accuracy: 0.95

reporting:
  output_dir: artifacts/data/language

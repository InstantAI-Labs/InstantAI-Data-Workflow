text_patterns:
  news_host: "(?i)(?:(?:nytimes|washingtonpost|wsj|ft\\.com|reuters|apnews|bbc|cnn|theguardian)|(?:news|herald|tribune|gazette|chronicle|post|times)\\.)"
  paywall: "(?i)\\b(?:subscribe\\s+to\\s+(?:read|continue|unlock)|this\\s+content\\s+is\\s+for\\s+subscribers|premium\\s+subscriber|paywall|sign\\s+in\\s+to\\s+(?:read|view)\\s+(?:this|the)\\s+(?:article|story)|members\\s+only\\s+content)\\b"
  drm: "(?i)\\b(?:drm[\\s-]protected|digital\\s+rights\\s+management|circumvent\\s+drm|remove\\s+drm|kindle\\s+drm|adobe\\s+drm)\\b"
  redistribution_prohibited: "(?i)\\b(?:redistribution\\s+(?:is\\s+)?(?:prohibited|not\\s+permitted|forbidden)|may\\s+not\\s+be\\s+(?:reproduced|redistributed|copied)|no\\s+part\\s+of\\s+this\\s+(?:publication|work|book)\\s+may\\s+be\\s+(?:reproduced|copied))\\b"
  proprietary_notice: "(?i)\\b(?:(?:©|copyright)\\s*\\d{4}.*all\\s+rights\\s+reserved|proprietary\\s+and\\s+confidential|unauthorized\\s+(?:reproduction|distribution|copying))\\b"
  syndicated: "(?i)\\b(?:(?:ap|reuters|afp|bloomberg)\\s+(?:wire|syndicate)|syndicated\\s+(?:from|by)|(?:©|copyright)\\s*(?:ap|reuters|afp))\\b"
  pd_book_markers: "(?i)\\b(?:project\\s+gutenberg|public\\s+domain\\s+ebook|this\\s+ebook\\s+is\\s+for\\s+the\\s+use\\s+of\\s+anyone|released\\s+into\\s+the\\s+public\\s+domain)\\b"
  commercial_book: "(?i)\\b(?:isbn[\\s:-]*[\\d\\-xX]{10,17}|(?:hardcover|paperback|ebook)\\s+edition|published\\s+by\\s+(?:penguin|random\\s+house|harper|simon|macmillan|scholastic))\\b"

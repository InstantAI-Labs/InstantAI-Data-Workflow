meta:
  id: data/licensing/default
  description: Copyright and license policy for pretraining corpus filtering

enabled: true

# Filtering toggles
reject_proprietary: true
reject_restricted: true
reject_paywalled: true
reject_drm: true
reject_redistribution_prohibited: true
reject_pirated_books: true
reject_incompatible_repos: true

flag_unknown: true
flag_attribution_required: true

allow_cc_by_sa: true
allow_government: true
allow_wikipedia_compatible: true

# When true, filtered.jsonl rows include full provenance schema (backward compat off by default)
include_provenance_in_jsonl: false

min_confidence_for_reject: 0.70

incompatible_repo_licenses:
  - GPL
  - Proprietary
  - Restricted

keep_licenses:
  - Public Domain
  - CC0
  - CC-BY
  - MIT
  - Apache-2.0
  - BSD

flag_licenses:
  - Unknown
  - CC-BY-SA
  - CC-BY-NC
  - LGPL
  - MPL

remove_licenses:
  - Proprietary
  - Restricted
  - GPL

output_dir: licensing

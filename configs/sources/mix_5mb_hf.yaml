meta:
  id: data/sources/mix_5mb_hf
  description: 7 MB smoke-test corpus — web, wiki, code, Q&A, instruction for pipeline validation
budget_bytes: 7000000

sources:
  - name: fineweb-edu
    hf_id: HuggingFaceFW/fineweb-edu
    hf_name: sample-10BT
    split: train
    streaming: true
    mix_pct: 28
    text_field: text

  - name: wikipedia-en
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.en
    split: train
    streaming: true
    mix_pct: 15
    text_field: text

  - name: starcoder-python
    hf_id: bigcode/starcoderdata
    split: train
    streaming: true
    mix_pct: 15
    text_field: content
    languages: [python]

  - name: stack-exchange
    hf_id: common-pile/stackexchange_filtered
    split: train
    streaming: true
    mix_pct: 17
    text_field: text

  - name: instruction-alpaca
    hf_id: yahma/alpaca-cleaned
    split: train
    streaming: true
    mix_pct: 15
    format: instruction_qa

  - name: cosmopedia-v2
    hf_id: HuggingFaceTB/cosmopedia
    hf_config: web_samples_v2
    split: train
    streaming: true
    mix_pct: 10
    text_field: text

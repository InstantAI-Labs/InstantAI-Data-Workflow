meta:
  id: data/sources/mix_100gb_hf
  description: ~102 GB corpus into corpus/raw — skips sources already in raw/

budget_bytes: 102000000000

sources:
  - name: fineweb
    hf_id: HuggingFaceFW/fineweb
    hf_name: sample-10BT
    split: train
    streaming: true
    mix_pct: 22
    text_field: text

  # allenai/dolma uses legacy HF scripts (broken on datasets>=3.7); DCLM is parquet+streaming.
  - name: dclm
    hf_id: mlfoundations/dclm-baseline-1.0
    split: train
    streaming: true
    mix_pct: 18
    text_field: text

  - name: wikipedia-en
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.en
    split: train
    streaming: true
    mix_pct: 5
    text_field: text

  - name: starcoder-python
    hf_id: bigcode/starcoderdata
    split: train
    streaming: true
    mix_pct: 10
    text_field: content
    languages: [python]

  - name: starcoder-javascript
    hf_id: bigcode/starcoderdata
    split: train
    streaming: true
    mix_pct: 5
    text_field: content
    languages: [javascript]

  - name: starcoder-java
    hf_id: bigcode/starcoderdata
    split: train
    streaming: true
    mix_pct: 3
    text_field: content
    languages: [java]

  - name: starcoder-rust
    hf_id: bigcode/starcoderdata
    split: train
    streaming: true
    mix_pct: 2
    text_field: content
    languages: [rust]

  - name: gutenberg
    hf_id: sedthh/gutenberg_english
    split: train
    streaming: true
    mix_pct: 10
    text_field: TEXT

  - name: arxiv
    hf_id: ccdv/arxiv-summarization
    split: train
    streaming: true
    mix_pct: 5
    text_field: article

  - name: cc-news
    hf_id: cc_news
    hf_config: en
    split: train
    streaming: true
    mix_pct: 5
    text_field: text

  - name: triviaqa
    hf_id: trivia_qa
    hf_config: rc.nocontext
    split: train
    streaming: true
    mix_pct: 3
    format: instruction_qa

  - name: squad
    hf_id: squad
    split: train
    streaming: true
    mix_pct: 2
    format: instruction_qa

  - name: gsm8k
    hf_id: openai/gsm8k
    hf_config: main
    split: train
    streaming: true
    mix_pct: 1
    format: instruction_qa

  - name: math
    hf_id: EleutherAI/hendrycks_math
    split: train
    streaming: true
    mix_pct: 1
    format: instruction_qa

  - name: stack-exchange
    hf_id: common-pile/stackexchange_filtered
    split: train
    streaming: true
    mix_pct: 3
    format: stack_exchange

  - name: cosmopedia-tech
    hf_id: HuggingFaceTB/cosmopedia
    hf_config: web_samples_v2
    split: train
    streaming: true
    mix_pct: 2
    text_field: text

  - name: govreport
    hf_id: ccdv/govreport-summarization
    split: train
    streaming: true
    mix_pct: 3
    text_field: report

meta:
  id: data/sources/mix_10gb_hf
  description: Diverse HuggingFace training corpus (~12 GB raw) — web, wiki, code, math, Q&A, instruction, multilingual
budget_bytes: 12000000000

sources:
  # --- high-quality web / educational (36%) ---
  - name: fineweb-edu
    hf_id: HuggingFaceFW/fineweb-edu
    hf_name: sample-10BT
    split: train
    streaming: true
    mix_pct: 17
    text_field: text

  - name: fineweb
    hf_id: HuggingFaceFW/fineweb
    hf_name: sample-10BT
    split: train
    streaming: true
    mix_pct: 10
    text_field: text

  - name: cosmopedia-v2
    hf_id: HuggingFaceTB/cosmopedia
    hf_config: web_samples_v2
    split: train
    streaming: true
    mix_pct: 9
    text_field: text

  # --- encyclopedia / reference (17%) ---
  - name: wikipedia-en
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.en
    split: train
    streaming: true
    mix_pct: 9
    text_field: text
    license: CC-BY-SA

  - name: wikipedia-de
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.de
    split: train
    streaming: true
    mix_pct: 3
    text_field: text

  - name: wikipedia-es
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.es
    split: train
    streaming: true
    mix_pct: 3
    text_field: text

  - name: wikipedia-fr
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.fr
    split: train
    streaming: true
    mix_pct: 2
    text_field: text

  # --- math / reasoning (9%) ---
  - name: open-web-math
    hf_id: open-web-math/open-web-math
    split: train
    streaming: true
    mix_pct: 9
    text_field: text

  # --- code (20%) ---
  - name: starcoder-python
    hf_id: bigcode/starcoderdata
    split: train
    streaming: true
    mix_pct: 15
    text_field: content
    languages: [python]

  - name: starcoder-javascript
    hf_id: bigcode/starcoderdata
    split: train
    streaming: true
    mix_pct: 5
    text_field: content
    languages: [javascript]

  # --- technical Q&A (7%) ---
  - name: stack-exchange
    hf_id: common-pile/stackexchange_filtered
    split: train
    streaming: true
    mix_pct: 7
    text_field: text

  # --- instruction Q&A (6%) ---
  - name: open-orca-instruct
    hf_id: Open-Orca/OpenOrca
    split: train
    streaming: true
    mix_pct: 6
    format: instruction_qa

  # --- multilingual wiki (5%) ---
  - name: wikipedia-hi
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.hi
    split: train
    streaming: true
    mix_pct: 3
    text_field: text

  - name: wikipedia-ar
    hf_id: wikimedia/wikipedia
    hf_config: 20231101.ar
    split: train
    streaming: true
    mix_pct: 2
    text_field: text
